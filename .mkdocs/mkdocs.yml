site_name: "LUCIA \u2014 The Human Chronicle"
site_description: A narrative encyclopedia of human civilization across 26 regions of the world
docs_dir: ..
site_dir: ../../chronicle-site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.integrate
  font:
    text: EB Garamond
    code: JetBrains Mono

markdown_extensions:
  - tables
  - attr_list
  - def_list
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search:
      lang: en

nav:
  - Home: index.md
  - Guides:
    - Style Guide: guides/STYLE-GUIDE.md
    - Pipeline: guides/PIPELINE.md
    - Templates: guides/TEMPLATES.md
    - How to Write a Chapter: guides/HOW-TO-WRITE-A-CHAPTER.md
  - Scoring:
    - Rubric: scoring/RUBRIC.md
    - Innovations: scoring/INNOVATIONS.md
    - Targets: scoring/TARGETS.md
  - Sources:
    - Master Registry: sources/MASTER.md
