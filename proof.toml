[meta]
name = "LUCIA"
description = "Human chronicle — world regions, peoples, and eras"

[files]
include = ["**/*.md"]
exclude = ["_archive/**", "*.aux", "*.log"]
root = true

[ascii_box]
enabled = true
tolerance = 2
code_blocks_only = true
check_col_separators = false

[ascii_char]
error_on_wide = false

[markdown_table]
ignore_extra_body_cols = true
